name: Inspect pull-request

on:
  workflow_call:
    inputs:
      variable_prefix:
        required: true
        type: string
        default: 'PR'
    outputs:
      ID:
        description: "The Pull Request ID"
        value: ${{ jobs.Classify.outputs.ID }}
      MILESTONE:
        description: "The Milestone title"
        value: ${{ jobs.Classify.outputs.MILESTONE }}
      RELEASE_NOTES:
        description: "Release Notes"
        value: ${{ jobs.Classify.outputs.RELEASE_NOTES }}

jobs:
  Classify:
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    outputs:
      ID: ${{ steps.set_vars.outputs.ID }}
      MILESTONE: ${{ steps.set_vars.outputs.MILESTONE }}
      RELEASE_NOTES: ${{ steps.set_vars.outputs.RELEASE_NOTES }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install GitHub CLI (if missing)
        run: |
          if ! command -v gh &> /dev/null; then
            echo "GH CLI not found, installing..."
            type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update
            sudo apt install gh -y
          fi
          
      - name: Inspect PR State
        id: set_vars
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          echo "=== PR CLASSIFICATION START ==="

          # -----------------------------
          # 1. Detect PR number
          # -----------------------------

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Event is pull_request"
            pr="${{ github.event.pull_request.number }}"
          else
            echo "Event is push → trying commit parsing"
            pr=$(git log --oneline | head -n1 | grep -Eo '#[0-9]+' | tr -d '#' || true)
          fi

          # -----------------------------
          # 2. If no PR → skip
          # -----------------------------
          if [[ -z "$pr" ]]; then
            echo "No PR detected → skipping downstream jobs"

            echo "ID=" >> $GITHUB_OUTPUT
            echo "MILESTONE=" >> $GITHUB_OUTPUT
            echo "RELEASE_NOTES=" >> $GITHUB_OUTPUT

            exit 0
          fi

          echo "Detected PR: $pr"

          # -----------------------------
          # 3. Fetch PR details
          # -----------------------------
          echo "Fetching PR data from GitHub API..."

          pr_json=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$pr")

          milestone=$(echo "$pr_json" | jq -r '.milestone.title // ""')
          state=$(echo "$pr_json" | jq -r '.state')
          notes=$(echo "$pr_json" | jq -r '.body // "---"')

          echo "PR State: $state"
          echo "Milestone: $milestone"

          # -----------------------------
          # 4. Set outputs
          # -----------------------------
          echo "ID=$pr" >> $GITHUB_OUTPUT
          echo "MILESTONE=$milestone" >> $GITHUB_OUTPUT
          echo "RELEASE_NOTES=$notes" >> $GITHUB_OUTPUT

          echo "=== PR CLASSIFICATION END ===