name: costco-ios build

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build Configuration'
        required: true
        default: 'Enterprise-QA'
        type: choice
        options:
          - Enterprise-QA
          - Release
      release_notes:
        description: 'Release Notes'
        required: false
        default: 'Release Notes'
env:
  BUILD_NUMBER: ${{ github.run_number }}
  ENTERPRISE_TEAM_ID: 'TGWXEY4D6F'
  APPSTORE_TEAM_ID: 'MCL67DL73Q'
  XCODE_VERSION: '26.2'
  SCHEME: 'Costco'
jobs:
  build:
    name: Build iOS App
    runs-on: macos-15
    timeout-minutes: 180
    env:
      CONFIG: ${{ github.event.inputs.configuration }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          fetch-tags: false

      - name: Version increment
        working-directory: ${{ github.workspace }}/Costco
        run: |
          set -e
          ipa_version=$(agvtool mvers -terse1 || echo "")
          agvtool new-version -all ${{ env.BUILD_NUMBER }} || true
          echo "Marketing version (CFBundleShortVersionString): ${ipa_version}"
          echo "Technical version (CFBundleVersion): ${{ env.BUILD_NUMBER }}"
          full_version="${ipa_version}_${{ env.BUILD_NUMBER }}"
          echo "IPA_VERSION=${full_version}" >> $GITHUB_ENV

      - name: Generate export options preference list
        env:
          CONFIGURATION: ${{ github.event.inputs.configuration }}
        run: |
          set -e
          export PATH=$PATH:/usr/libexec
          export_options="${GITHUB_WORKSPACE}/exportOptions-${CONFIGURATION}.plist"
          bundle_id='com.costco.costco'
          group_identifier='group.com.costco.costco'
          
          echo "generating: ${export_options}"
          
          case ${CONFIGURATION} in
            Enterprise-QA)
              PlistBuddy -c "add method string enterprise" "$export_options"
              PlistBuddy -c "add :provisioningProfiles:${bundle_id}.qa string Costco Mobility QA" "$export_options"
              PlistBuddy -c "add teamID string ${{ env.ENTERPRISE_TEAM_ID }}" "$export_options"
              PlistBuddy -c "add com.apple.security.application-groups:0 string $group_identifier" "$export_options"
              PlistBuddy -c "add :provisioningProfiles:com.costco.costco.qa.notification-extension string Costco Mobility QA Notification Extension" "$export_options"
              PlistBuddy -c "add :provisioningProfiles:com.costco.costco.qa.DMCWidget string Costco Mobility QA DMC Widget Extension" "$export_options"
              ;;
            Release)
              PlistBuddy -c "add method string app-store" "$export_options"
              PlistBuddy -c "add :provisioningProfiles:${bundle_id} string Costco App Store" "$export_options"
              PlistBuddy -c "add teamID string ${{ env.APPSTORE_TEAM_ID }}" "$export_options"
              PlistBuddy -c "add com.apple.security.application-groups:0 string $group_identifier" "$export_options"
              PlistBuddy -c "add :provisioningProfiles:com.costco.costco.notification-extension string Costco App Notification Extension" "$export_options"
              PlistBuddy -c "add :provisioningProfiles:com.costco.costco.DMCWidget string Costco App DMC Widget Extension" "$export_options"
              ;;
          esac

          PlistBuddy -c "add signingStyle string manual" "$export_options"
          PlistBuddy -c "add signingCertificate string iPhone Distribution" "$export_options"
          PlistBuddy -c "add compileBitcode bool false" "$export_options"
          PlistBuddy -c "add uploadSymbols bool true" "$export_options"
          PlistBuddy -c "add uploadBitcode bool false" "$export_options"
          PlistBuddy -c "add stripSwiftSymbols bool true" "$export_options"

          echo 'content:'
          cat "$export_options"
          echo "EXPORT_OPTIONS=${export_options}" >> $GITHUB_ENV
      - name:  Decrypt secure files
        working-directory: ${{ github.workspace }}/Costco/Signing
        env:
          CONFIGURATION: ${{ github.event.inputs.configuration }}
          CIPHER: ${{ secrets.CIPHER }}
        run: |
          set -e    
          echo "Using configuration: $CONFIGURATION"
          # Decrypt configuration-specific signing files
          find . -name "*.enc" | grep "$CONFIGURATION" | while read -r f; do
            echo "decrypting file: ${f%.*}"
            openssl des3 -d -in "$f" -out "${f%.*}" -k "$CIPHER"
            rm -f "$f"
          done
          # Decrypt SSH key
          echo "decrypting noknok ssh key"
          openssl des3 -d -in noknok_deploy_key.enc -out noknok_deploy_key -k "$CIPHER"
          echo "listing decrypted files .."
          ls -altr

      - name:  Create costco.keychain
        working-directory: ${{ github.workspace }}/Costco/Signing
        env:
          CIPHER: ${{ secrets.CIPHER }}
        run: |
          set -e
          # create a keychain and set it as the default
          keychain=$(pwd)/costco.keychain
          security create-keychain -p "$CIPHER" "$keychain"
          security list-keychains -s "$keychain"    
          # unlock the keychain for 30 minutes
          security unlock-keychain -p "$CIPHER" "$keychain"
          security set-keychain-settings -lut 1800 "$keychain"
          security default-keychain -s "$keychain"    
          # Import all .p12 certificates
          for p in *.p12; do
            if [ -f "$p" ]; then
              echo "Importing: $p"
              security import "./$p" -k "$keychain" -P "$CIPHER" -A
            fi
          done 
          #security set-key-partition-list -S apple-tool:,apple: -s -k "$CIPHER" "$keychain" || true
          echo "COSTCO_KEYCHAIN=$keychain" >> $GITHUB_ENV
          echo "generated keychain: $COSTCO_KEYCHAIN"

      - name: Install Noknok SSH deploy key
        working-directory: ${{ github.workspace }}/Costco/Signing
        env:
          PASS: ${{ secrets.NOK_PWD }}
        run: |
          set -e
          SSH_DIR="$HOME/.ssh"
          SSH_CONFIG="$SSH_DIR/config"
          KEY_PATH="$(pwd)/noknok_deploy_key"
          mkdir -p "$SSH_DIR"
          chmod 700 "$SSH_DIR"
          # Create SSH config if not exists
          if [ ! -f "$SSH_CONFIG" ] || ! grep -q "UseKeychain" "$SSH_CONFIG"; then
            echo "Adding macOS Keychain rules to SSH config..."
            cat > "$SSH_CONFIG" << EOF
          Host github.com
            HostName github.com
            User git
            IdentityFile $KEY_PATH
            IdentitiesOnly yes
            UseKeychain yes
            AddKeysToAgent yes
            StrictHostKeyChecking no
          EOF
            chmod 600 "$SSH_CONFIG"
          fi
          chmod 600 "$KEY_PATH"
          # Start SSH agent
          eval "$(ssh-agent -s)"
          echo "Unlocking and adding the key to the agent..."
          echo "$PASS" | ssh-add "$KEY_PATH"
          echo "Currently loaded keys:"
          ssh-add -l
          # Export variables for next steps
          echo "GIT_SSH_COMMAND=ssh -i $KEY_PATH -o IdentitiesOnly=yes" >> $GITHUB_ENV
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV
          # Test SSH
          ssh -T git@github.com || true
          # Test repo access
          git ls-remote git@github.com:nxt-costco-com/noknok-ios-sdk.git

      - name: Set codesigning IDs
        env:
          CIPHER: ${{ secrets.CIPHER }}
          COSTCO_KEYCHAIN: ${{ env.COSTCO_KEYCHAIN }}
        run: |
          set -e
          security unlock-keychain -p "$CIPHER" "$COSTCO_KEYCHAIN"
          uuid=$(
            security find-identity -v -p codesigning | \
            awk '{$1=""; print $0}' | sort -u | grep -i costco | \
            awk '{print $1}' | xargs
          )
          if [[ ${#uuid} -eq 0 ]]; then
            echo 'Error: Invalid code signing ID'
            exit 1
          fi
          echo "Codesigning ID: $uuid"
          echo "CODESIGN_ID=$uuid" >> $GITHUB_ENV

        # define provisioning profile variables
      - name: Install provisioning profiles
        working-directory: ${{ github.workspace }}/Costco/Signing
        run: |
          set -e
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/

          for profile in $(find . -name "*.*provision"); do
            echo "provisioning profile: $profile"

            if [[ "$profile" == *"Notification"* ]]; then
              ext_uuid=$(grep UUID -A1 -a "$profile" | grep -io "[-A-F0-9]\{36\}")
              ext_extension="${profile##*.}"
              cp -a "$profile" ~/Library/MobileDevice/Provisioning\ Profiles/"$ext_uuid.$ext_extension"
              echo "Installing notification provisioning profile: $ext_uuid.$ext_extension"

            elif [[ "$profile" == *"Widget"* ]]; then
              widget_uuid=$(grep UUID -A1 -a "$profile" | grep -io "[-A-F0-9]\{36\}")
              widget_extension="${profile##*.}"
              cp -a "$profile" ~/Library/MobileDevice/Provisioning\ Profiles/"$widget_uuid.$widget_extension"
              echo "Installing widget provisioning profile: $widget_uuid.$widget_extension"

            else
              uuid=$(grep UUID -A1 -a "$profile" | grep -io "[-A-F0-9]\{36\}")
              extension="${profile##*.}"
              cp -a "$profile" ~/Library/MobileDevice/Provisioning\ Profiles/"$uuid.$extension"
              echo "Installing provisioning profile: $uuid.$extension"
            fi
          done
          echo "PROVISIONING_PROFILE=$uuid" >> $GITHUB_ENV
          echo "EXT_PROVISIONING_PROFILE=$ext_uuid" >> $GITHUB_ENV
          echo "EXT_WIDGET_PROVISIONING_PROFILE=$widget_uuid" >> $GITHUB_ENV

          echo "Exported:"
          echo "  PROVISIONING_PROFILE=$uuid"
          echo "  EXT_PROVISIONING_PROFILE=$ext_uuid"
          echo "  EXT_WIDGET_PROVISIONING_PROFILE=$widget_uuid"
      - name: Set SDK
        run: |
            set -e
            echo "Setting xcode version to: ${{ env.XCODE_VERSION }} .."
            sudo xcode-select -switch /Applications/Xcode_${{ env.XCODE_VERSION }}.app
            _sdk="$(xcodebuild -showsdks | grep -i ios | grep -iv simulator | grep sdk | awk -F\"sdk\" '{print $NF}' | xargs || true)"
            echo "SDK=${_sdk}" >> $GITHUB_ENV
            echo "Detected SDK: $_sdk"
            xcodebuild -version

      - name: Set Xcode archive path
        env:
          CONFIGURATION: ${{ github.event.inputs.configuration }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          archive_path="$GITHUB_WORKSPACE/${BUILD_NUMBER}-${CONFIGURATION}"      
          mkdir -p "$archive_path"
          echo "ARCHIVE_PATH=$archive_path" >> $GITHUB_ENV
          echo "ARCHIVE_PATH: $archive_path"

      - name: Pod Install
        if: false 
        working-directory: ${{ github.workspace }}/Costco
        run: pod install
      
      - name: Install Distributions
        env:
          SDK: ${{ env.SDK }}
        run: |
          echo 'Setting xcode version: ${{ env.XCODE_VERSION }}'
          sudo xcode-select -switch /Applications/Xcode_${{ env.XCODE_VERSION }}.app
          version=$(echo "$SDK" | grep -oE '[0-9]+\.[0-9]+')
          echo "$version"
          if xcrun simctl list runtimes | grep -Eq "\b${VERSION}\b"; then
            echo "Distribution SDK is already present"
          else
            echo "Required SDK not available, Installing the verson ${_sdk}"
            cpu_count=$(sysctl hw.ncpu | awk '{print $NF}')
            xcodebuild -downloadPlatform iOS -buildVersion $(version)
            echo "Installed the distributions "
          fi
      
      - name: 'Build ${{ github.event.inputs.configuration }}'
        env:
          ARCHIVE_PATH: ${{ env.ARCHIVE_PATH }}
          CODESIGN_ID: ${{ env.CODESIGN_ID }}
          PROVISIONING_PROFILE: ${{ env.PROVISIONING_PROFILE }}
          EXT_PROVISIONING_PROFILE: ${{ env.EXT_PROVISIONING_PROFILE }}
          EXT_WIDGET_PROVISIONING_PROFILE: ${{ env.EXT_WIDGET_PROVISIONING_PROFILE }}
          GIT_SSH_COMMAND: ${{ env.GIT_SSH_COMMAND }}
          SSH_AUTH_SOCK: ${{ env.SSH_AUTH_SOCK }}
          SSH_AGENT_PID: ${{ env.SSH_AGENT_PID }}
          SCHEME: ${{ env.SCHEME }}
        run: |
          set -e    
          echo 'Setting xcode version: ${{ env.XCODE_VERSION }}'
          sudo xcode-select -switch /Applications/Xcode_${{ env.XCODE_VERSION }}.app    
          cpu_count=$(sysctl hw.ncpu | awk '{print $NF}')
          echo  "Creating xcode archive: $ARCHIVE_PATH .."
          xcodebuild clean archive \
            -jobs $cpu_count \
            -workspace "${{ github.workspace }}/Costco/Costco.xcworkspace" \
            -scheme $SCHEME \
            -configuration ${{ github.event.inputs.configuration }} \
            -archivePath $ARCHIVE_PATH \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=$CODESIGN_ID \
            # PROVISIONING_PROFILE_SPECIFIER=$(PROVISIONING_PROFILE) \
            APP_PROFILE=$PROVISIONING_PROFILE \
            EXTENSION_PROFILE=$EXT_PROVISIONING_PROFILE \
            EXTENSION_PROFILE=$EXT_WIDGET_PROVISIONING_PROFILE \
            | xcpretty
      - name: Collect App's dSYM's
        env:
          ARCHIVE_PATH: ${{ env.ARCHIVE_PATH }}
        run: |
            set -e
            echo 'archiving debug symbols'
            archive_dir="${ARCHIVE_PATH}.xcarchive"
            debug_symbols=$(find -L "$archive_dir" -name "*app.dSYM" -type d | grep -i "\.app" | head -n 1 || true)
            appex_notification_debug_symbols=$(find -L "$archive_dir" -name "*Notification*appex.dSYM" -type d | grep -i "\.app" | head -n 1 || true)
            appex_widget_debug_symbols=$(find -L "$archive_dir" -name "*Widget*appex.dSYM" -type d | grep -i "\.app" | head -n 1 || true)
            dirname="$GITHUB_WORKSPACE/dSYM"
            if [ ! -d "$dirname" ]
            then
                mkdir -p $dirname
                cp -r "${debug_symbols}" "${dirname}"
                cp -r "${appex_notification_debug_symbols}" "${dirname}"
                cp -r "${appex_widget_debug_symbols}" "${dirname}"
            else
                echo "File exists"
            fi
            echo "${debug_symbols}"
            echo "${appex_notification_debug_symbols}"
            echo "${appex_widget_debug_symbols}"

            if [[ -n "${debug_symbols}" ]]; then
              zip -r $ARCHIVE_PATH-dSYM.zip "${dirname}"
            else
              echo 'WARNING: missing debug symbols'
            fi

      - name: Remove unsupported architectures
        working-directory: ${{ github.workspace }}
        env:
          ARCHIVE_PATH: ${{ env.ARCHIVE_PATH }}
        run: |
            architectures=(arm64)
            echo 'searching for frameworks'
            find -L ${{ env.ARCHIVE_PATH }}.xcarchive -name "*.framework" -type d | while read -r framework; do
              echo "Framework: $framework"
              binaryname=$(defaults read "$framework/Info.plist" CFBundleExecutable 2>/dev/null)
              
              if [[ -n $binaryname ]]; then
                # check if the binary is a FAT file
                binarypath="${framework}/${binaryname}"
                lipo -info "$binarypath" | grep -iv 'non-fat' 2>/dev/null
              
                if [[ $? -eq 0 ]]; then
                  extracted=()
                  for arch in "${architectures[@]}"; do
                    echo "extracting ${arch} from ${binaryname} .."
                    lipo -extract "${arch}" "${binarypath}" -o "${binarypath}-${arch}"
                    extracted+=("${binarypath}-${arch}")
                  done

                  if [ ${#extracted[@]} -gt 0 ]; then
                    echo "merging extracted architectures: ${architectures[@]} .."
                    lipo -o "${binarypath}-merged" -create "${extracted[@]}"
                    rm -rf "${extracted[@]}"
                    mv "${binarypath}-merged" "${binarypath}"
                    echo "replaced original binary with arm64-only version"
                  fi
                fi
              fi
            done

      - name: Export xcode archive (IPA)
        working-directory: ${{ github.workspace }}
        env:
          ARCHIVE_PATH: ${{ env.ARCHIVE_PATH }}
          CODESIGN_ID: ${{ env.CODESIGN_ID }}
          PROVISIONING_PROFILE: ${{ env.PROVISIONING_PROFILE }}
          EXT_PROVISIONING_PROFILE: ${{ env.EXT_PROVISIONING_PROFILE }}
          EXT_WIDGET_PROVISIONING_PROFILE: ${{ env.EXT_WIDGET_PROVISIONING_PROFILE }}
          GIT_SSH_COMMAND: ${{ env.GIT_SSH_COMMAND }}
          SSH_AUTH_SOCK: ${{ env.SSH_AUTH_SOCK }}
          SSH_AGENT_PID: ${{ env.SSH_AGENT_PID }}
          SCHEME: ${{ env.SCHEME }}
          EXPORT_OPTIONS: ${{ env.EXPORT_OPTIONS }}
        run: |
            #!/bin/bash
            set -e
    
            cores=$(sysctl hw.ncpu | awk '{print $NF}')
            echo "Creating ipa from $ARCHIVE_PATH .."
            xcodebuild \
              -exportArchive \
              -jobs ${cores} \
              -archivePath $ARCHIVE_PATH.xcarchive \
              -exportPath $ARCHIVE_PATH \
              -exportOptionsPlist $EXPORT_OPTIONS \
              # PROVISIONING_PROFILE_SPECIFIER=$(PROVISIONING_PROFILE) \
              APP_PROFILE=$PROVISIONING_PROFILE \
              EXTENSION_PROFILE=$EXT_PROVISIONING_PROFILE \
              EXTENSION_PROFILE=$EXT_WIDGET_PROVISIONING_PROFILE \
              EMBEDDED_CONTENT_CONTAINS_SWIFT=Yes
      - name: Compile PR Release Notes
        env:
          GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG: ${{ github.event.inputs.configuration || 'Enterprise-QA' }}
          PR_RELEASE_NOTES_INPUT: ${{ github.event.inputs.release_notes || 'Release Notes' }}
          PR_MILESTONE: ${{ github.event.pull_request.milestone.title || '' }}
        run: |
          set -e
          echo 'collecting build summary for PR'
          release_notes="${{ github.workspace }}/${{ github.run_number }}-${CONFIG}-release-notes.md"
          echo "_____________" >> "$release_notes"
          echo "Build Summary: " >> "$release_notes"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
           echo "- PullRequest: ${{ github.event.pull_request.number }}" >> "$release_notes"
          fi
          echo "- Build Configuration: $CONFIG" >> "$release_notes"
          echo "- Build: ${{ github.run_number }}" >> "$release_notes"
          echo "- Build url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$release_notes"
          echo "- GIT commit: ${{ github.sha }}" >> "$release_notes"
          echo "- GIT url: ${{ github.server_url }}/${{ github.repository }}" >> "$release_notes"
          echo "- GIT branch: ${{ github.ref_name }}" >> "$release_notes"
          echo "_____________" >> "$release_notes"   
          echo "Release Notes: " >> "$release_notes"
          echo "- $PR_RELEASE_NOTES_INPUT" >> "$release_notes"
          if [[ -n "$PR_MILESTONE" ]]; then
            echo "Gathering Pull-requests with milestone: $PR_MILESTONE"
            curl -s --fail -X GET \
            -H "Authorization: Bearer $GIT_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/issues?state=closed" > issues.json
  
            # query all related pull-requests
            prs=$(cat issues.json | jq -r --arg m "$PR_MILESTONE" \
            '.[] | select(.milestone != null and .milestone.title == $m and (.labels[]?.name == "Release Notes")) | .pull_request.url' | grep "api.github.com" || true)
            # loop through pull-requests
            count=$(echo "$prs" | wc -l | xargs || echo 0)
            echo "Found $count related pull-requests"
            for url in $prs; do
              pr_id=$(basename "$url")
              echo "checking PR: $pr_id"

              pr=$(curl -s --fail -H "Authorization: Bearer $GIT_TOKEN" "$url")
              is_merged=$(echo "$pr" | jq -r '.merged')

              if [[ "$is_merged" == "true" ]]; then
                body=$(echo "$pr" | jq -r '.body // empty')
                [ -n "$body" ] && echo "- $body" >> "$release_notes"
              else
                echo "Skipping PR $pr_id because it was closed without merging."
              fi
            done
          fi
          echo "RELEASE_NOTES_FILE=$release_notes" >> $GITHUB_ENV
      - name: Stage artifacts
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          CONFIG: ${{ github.event.inputs.configuration || 'Enterprise-QA' }}
          ARCHIVE_PATH: ${{ env.ARCHIVE_PATH }}
        run: |
          set -e

          STAGING_DIR="$GITHUB_WORKSPACE/artifacts"
          mkdir -p "$STAGING_DIR"

          echo "Staging IPA .."
          find "$GITHUB_WORKSPACE" -type f -name "*.ipa" -not -path "$STAGING_DIR/*" \
            -exec cp -a {} "$STAGING_DIR/${BUILD_NUMBER}-${CONFIG}.ipa" \;

          echo "Staging debug symbols .."
          find "$GITHUB_WORKSPACE" -type f -name "*dSYM.zip" \
            -exec cp -a {} "$STAGING_DIR/${BUILD_NUMBER}-${CONFIG}-dSYM.zip" \;

          echo "Staging release notes .."
          cat "$GITHUB_WORKSPACE"/*"${CONFIG}"*.md || true
          cp "$GITHUB_WORKSPACE"/*"${CONFIG}"*.md "$STAGING_DIR/" || echo "No release notes found"
          echo "Staging xcarchive .."
          if [ -d "${ARCHIVE_PATH}.xcarchive" ]; then
            zip -r "$STAGING_DIR/$(basename "$ARCHIVE_PATH").xcarchive.zip" "${ARCHIVE_PATH}.xcarchive"
          else
            echo "Warning: xcarchive not found at ${ARCHIVE_PATH}.xcarchive"
          fi
          echo "Sanity check - staged artifacts:"
          ls -alt "$STAGING_DIR" | grep "$CONFIG" || true
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.run_number }}
          path: ${{ github.workspace }}/artifacts/