name: test

on:
  push:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Costco iOS branch name'
        required: true
        default: 'develop'
        type: string
env:
  BUILD_NUMBER: ${{ github.run_number }}
  ENTERPRISE_TEAM_ID: 'TGWXEY4D6F'
  APPSTORE_TEAM_ID: 'MCL67DL73Q'
  XCODE_VERSION: '26.2'

jobs:
  checkout:
      name: test
      runs-on: ubuntu-latest
      timeout-minutes: 180
      env:
        BRANCH_NAME: ${{ github.event.inputs.branch_name }}
        BUILD_NUMBER: ${{ github.run_number }}
      steps:
        - name: Setup Android SDK
          uses: android-actions/setup-android@v4
        - name: Package Validation (AAPT)
          shell: bash
          run: |
            set -x
            AAPT=$(find "$ANDROID_HOME/build-tools" -name "aapt" 2>/dev/null | sort -rV | head -1)
            if [ -z "$AAPT" ]; then
              AAPT=$(find "$ANDROID_HOME/build-tools" -name "aapt2" 2>/dev/null | sort -rV | head -1)
            fi
            echo "Using: $AAPT"


        - name: Install Firebase Tools
          run: |
    
            curl -sL https://firebase.tools/bin/linux/latest -o "$HOME/firebase"
            chmod +x "$HOME/firebase"
            echo "$HOME" >> $GITHUB_PATH
            firebase --version

        - name: Verify Firebase
          run: firebase --version
        - name: Install Temurin JDK 17 Manually
          shell: bash
          run: |
            echo "=== Installing Temurin JDK 17 ==="

            JAVA_DIR="$RUNNER_TEMP/java17"

            rm -rf "$JAVA_DIR"

            mkdir -p "$JAVA_DIR"

            cd "$RUNNER_TEMP"

            wget -q https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.19%2B10/OpenJDK17U-jdk_x64_linux_hotspot_17.0.19_10.tar.gz

            tar -xzf OpenJDK17U-jdk_x64_linux_hotspot_17.0.19_10.tar.gz

            EXTRACTED_DIR=$(find . -maxdepth 1 -type d -name "jdk-17*" | head -n 1)

            mv "$EXTRACTED_DIR"/* "$JAVA_DIR"

            echo "JAVA_HOME=$JAVA_DIR" >> $GITHUB_ENV
            echo "$JAVA_DIR/bin" >> $GITHUB_PATH

            echo "=== Java Installed ==="

            java -version
        
