name: test

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Costco iOS branch name'
        required: true
        default: 'develop'
        type: string
env:
  BUILD_NUMBER: ${{ github.run_number }}
  ENTERPRISE_TEAM_ID: 'TGWXEY4D6F'
  APPSTORE_TEAM_ID: 'MCL67DL73Q'
  XCODE_VERSION: '26.2'

jobs:
  checkout:
      name: checkout
      runs-on: macOS-15
      timeout-minutes: 180
      env:
        BRANCH_NAME: ${{ github.event.inputs.branch_name }}
        BUILD_NUMBER: ${{ github.run_number }}
      steps:
        - name: Checkout Repo
          uses: actions/checkout@v4
          with:
            fetch-depth: 1
            fetch-tags: false
            clean: true
        - name: Set SDK
          run: |
            set -e
            echo "Setting xcode version to: ${{ env.XCODE_VERSION }} .."
            sudo xcode-select -switch /Applications/Xcode_${{ env.XCODE_VERSION }}.app || true
            _sdk="$(xcodebuild -showsdks | grep -i ios | grep -iv simulator | grep sdk | awk -F\"sdk\" '{print $NF}' | xargs || true)"
            echo "SDK=${_sdk}" >> $GITHUB_ENV

