name: Costco iOS

on:
  push:
    branches:
      - develop
      - 'releases/release-*'
      - 'hotfix-*'
  pull_request:
    branches:
      - develop
      - 'releases/release-*'
      - 'hotfix-*'
  workflow_dispatch:
    inputs:
      configuration:
        description: Build Configuration
        required: true
        default: Enterprise-QA
        type: choice
        options:
          - Enterprise-QA
          - Release
      release_notes:
        description: Release Notes
        required: false
        default: Release Notes
        type: string
      force_upload_simulator_build:
        description: Force simulator build upload to Pipelines Artifacts (Debug configuration)
        required: false
        default: false
        type: boolean
      force_upload_saucelabs_build:
        description: Force device build upload to SauceLabs (Enterprise-QA configuration)
        required: false
        default: false
        type: boolean

env:
  WORKSPACE: ${{ github.workspace }}
  GIT_API_URL: https://github.com/nxt-costco-com/costco-ios
  SAUCELABS_API: https://api.us-west-1.saucelabs.com/v1/storage/upload
  SAUCELABS_PACKAGE_ALIAS: CostcoDebug.zip
  SAUCELABS_IPA_ALIAS: CostcoRelease.ipa
  VERACODE_URL: https://tools.veracode.com/integrations/xcode/com.veracode.mobileapplicationpackager.dmg
  ENTERPRISE_TEAM_ID: TGWXEY4D6F
  APPSTORE_TEAM_ID: MCL67DL73Q
  SCHEME: Costco
  XCODE_VERSION: "26.2"
  OS_VERSION: "26.2"
  MACOS_RUNNER: macos-15

jobs:
  pr-validation:
    name: pre-merge-check
    if: github.event_name == 'pull_request'
    runs-on: macos-15

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          fetch-tags: false
          clean: true
          persist-credentials: true

      - name: Check Merge Status
        shell: bash
        run: |
          set -e
          echo "Testing merge .."

          # Create local branch from PR HEAD
          git checkout -b local/ci

          # Set base git configuration
          git config user.email "iseas@costco.com"
          git config user.name "$(hostname)"

          TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"

          # Fetch and checkout target branch
          git fetch origin "$TARGET_BRANCH"
          git checkout -B target "origin/$TARGET_BRANCH"

          # Attempt merge 
          if ! git merge --no-ff local/ci; then
            echo "Found merge errors"
            exit 1
          fi

          echo "No merge issues"
      - name: Decrypt Secure Files
        working-directory: ${{ github.workspace }}/Costco/Signing
        env:
          CONFIGURATION: "Enterprise-QA"
          CIPHER: ${{ secrets.CIPHER }}
        run: |
          #!/bin/bash
          set -e
          echo "Using configuration: $CONFIGURATION"
          find . -name "*.enc" | grep "$CONFIGURATION" | while read -r f; do
            echo "decrypting file: ${f%.*}"
            openssl des3 -d -in "$f" -out "${f%.*}" -k "$CIPHER"
            rm -f "$f"
          done
          echo "decrypting noknok ssh key"
          openssl des3 -d -in noknok_deploy_key.enc -out noknok_deploy_key -k "$CIPHER"
          echo "listing decrypted files .."
          ls -altr

      - name: Install NokNok SSH Deploy Key
        working-directory: ${{ github.workspace }}/Costco/Signing
        env:
          PASS: ${{ secrets.NOK_PWD }}
        run: |
          #!/bin/bash
          set -e
          SSH_DIR="$HOME/.ssh"
          SSH_CONFIG="$SSH_DIR/config"
          KEY_PATH="$(pwd)/noknok_deploy_key"
          mkdir -p "$SSH_DIR"
          chmod 700 "$SSH_DIR"
          if [ ! -f "$SSH_CONFIG" ] || ! grep -q "UseKeychain" "$SSH_CONFIG"; then
            echo "Adding macOS Keychain rules to SSH config..."
            cat > "$SSH_CONFIG" << EOF
          Host github.com
            HostName github.com
            User git
            IdentityFile $KEY_PATH
            IdentitiesOnly yes
            UseKeychain yes
            AddKeysToAgent yes
            StrictHostKeyChecking no
          EOF
            chmod 600 "$SSH_CONFIG"
          fi
          chmod 600 "$SSH_CONFIG"
          chmod 600 "$KEY_PATH"
          eval "$(ssh-agent -s)"
          echo "Unlocking and adding the key to the agent..."
          echo "$PASS" | ssh-add "$KEY_PATH"
          echo "Currently loaded keys:"
          ssh-add -l
          echo "GIT_SSH_COMMAND=ssh -i $KEY_PATH -o IdentitiesOnly=yes" >> $GITHUB_ENV
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV
          ssh -T git@github.com || true
          git ls-remote git@github.com:nxt-costco-com/noknok-ios-sdk.git

      - name: Set Target Simulator
        shell: bash
        run: |
          set -e
          echo "Setting xcode version to: ${{ env.XCODE_VERSION }} .."
          sudo xcode-select -switch "/Applications/Xcode_${{ env.XCODE_VERSION }}.app"

          simulators=$(xcrun xctrace list devices 2>&1 | grep -i iphone | grep -i pro | grep -v "+")

          if [ -z "$simulators" ]; then
            echo "::error::No matching simulators found"
            exit 1
          fi

          count=$(echo "$simulators" | wc -l | tr -d '[:space:]')
          index=$(( count / 2 ))
          if [ "$index" -lt 1 ]; then
            index=1
          fi

          simulator=$(echo "$simulators" | sed -n "${index}p" | awk -F'[' '{print $1}' | xargs)
          device_name=$(echo "$simulator" | awk -F'(' '{print $1}' | sed 's/Simulator//' | xargs)

          if [ -z "$device_name" ]; then
            echo "::error::Failed to parse simulator name"
            exit 1
          fi

          echo "SIMULATOR=${device_name}" >> "$GITHUB_ENV"
          echo "OS_VERSION=${{ env.OS_VERSION }}" >> "$GITHUB_ENV"

          echo "Auto-selected iOS simulator: ${device_name}"
          echo "Setting iOS version: ${{ env.OS_VERSION }} .."

      - name: Set SDK
        run: |
          #!/bin/bash
          set -e
          echo "Detecting SDK for Xcode ${{ env.XCODE_VERSION }} .."
          _sdk="$(xcodebuild -showsdks | grep -i iphonesimulator | awk '{print $NF}' | xargs || true)"
          if [ -z "$_sdk" ]; then
            echo "::error::Failed to detect iOS simulator SDK"
            exit 1
          fi
          echo "SDK=${_sdk}" >> $GITHUB_ENV
          echo "Detected SDK: $_sdk"
          xcodebuild -version

      - name: Set Time Zone
        run: sudo systemsetup -settimezone America/Los_Angeles

      - name: List Runtimes
        run: xcrun simctl list runtimes
      - name: Install Distributions
        env:
          SDK: ${{ env.SDK }}
        run: |
          #!/bin/bash
          set -e
          echo "Setting xcode version: ${{ env.XCODE_VERSION }}"
          sudo xcode-select -switch /Applications/Xcode_${{ env.XCODE_VERSION }}.app
          version=$(echo "$SDK" | grep -oE '[0-9]+\.[0-9]+')
          echo "Checking for iOS runtime version: $version"
          if xcrun simctl list runtimes | grep -Eq "\b${version}\b"; then
            echo "Distribution SDK is already present"
          else
            echo "Required SDK not available, installing version $SDK"
            cpu_count=$(sysctl hw.ncpu | awk '{print $NF}')
            xcodebuild -downloadPlatform iOS -buildVersion "$version"
            echo "Installed the distributions"
          fi

      - name: Install xcpretty
        run: sudo gem install xcpretty xcpretty-json-formatter xcpretty-travis-formatter

      - name: Run Unit Tests
        env:
          GIT_SSH_COMMAND: ${{ env.GIT_SSH_COMMAND }}
          SSH_AUTH_SOCK: ${{ env.SSH_AUTH_SOCK }}
          SSH_AGENT_PID: ${{ env.SSH_AGENT_PID }}
          OS_VERSION: ${{ env.OS_VERSION }}
          SIMULATOR: ${{ env.SIMULATOR }}
          SCHEME: ${{ env.SCHEME }}
          SDK: ${{ env.SDK }}
        run: |
          set -eo pipefail
          xcodebuild \
            test \
            -workspace "${{ github.workspace }}/Costco/Costco.xcworkspace" \
            -scheme "$SCHEME" \
            -sdk "$SDK" \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=$SIMULATOR,OS=$OSVERSION" \
            -parallel-testing-enabled NO \
            -derivedDataPath "${{ github.workspace }}/derivedData" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --report junit --output-dir derivedData/test-reports

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: derivedData/test-reports/

  classify:
      name: Inspect pull-request
      if: github.event_name == 'push' || github.event_name == 'pull_request'
      runs-on: ubuntu-latest 
      outputs:
        PR_ID: ${{ steps.set_vars.outputs.PR_ID }}
        PR_MILESTONE: ${{ steps.set_vars.outputs.PR_MILESTONE }}
        PR_RELEASE_NOTES: ${{ steps.set_vars.outputs.PR_RELEASE_NOTES }}
      uses: ./.github/workflows/pr-state-job.yml
      with:
        variable_prefix: PR
      secrets: inherit
  
  debug:
    name: Build (Enterprise-QA)
    needs: classify    
    if: needs.classify.outputs.PR_ID != '' && 
      (contains(github.ref, 'refs/heads/develop')
    runs-on: macos-15 
    timeout-minutes: 180
    steps:
      - name: Execute Build Template
        uses: ./.github/workflows/build-task-template.yml
        with:
          configuration: 'Enterprise-QA'
          PR_ID: ${{ needs.classify.outputs.PR_ID }}
          PR_MILESTONE: ${{ needs.classify.outputs.PR_MILESTONE }}
          PR_RELEASE_NOTES: ${{ needs.classify.outputs.PR_RELEASE_NOTES }}
        secrets: inherit
  
  release:
    name: Build (Release)
    needs: classify    
    if: |
      needs.classify.outputs.PR_ID != '' && 
      (contains(github.ref, 'refs/heads/release') || contains(github.ref, 'refs/heads/hotfix'))
    runs-on: macos-15 
    timeout-minutes: 180
    steps:
      - name: Execute Build Template
        uses: ./.github/workflows/build-task-template.yml
        with:
          configuration: 'Release'
          PR_ID: ${{ needs.classify.outputs.PR_ID }}
          PR_MILESTONE: ${{ needs.classify.outputs.PR_MILESTONE }}
          PR_RELEASE_NOTES: ${{ needs.classify.outputs.PR_RELEASE_NOTES }}
        secrets: inherit
 
  build-test:
    name: Build (Build For Testing)
    needs: classify
    if: |
      github.event.inputs.force_upload_simulator_build == 'true' || 
      github.event.inputs.force_upload_saucelabs_build == 'true' || 
      (needs.classify.outputs.PR_ID != '' && github.ref == 'refs/heads/develop')
    
    runs-on: macos-15
    
    env:
      XCUI_TEST_BUILD_PATH: ${{ github.workspace }}/derivedData/Build/Products/Debug-iphonesimulator/

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          fetch-tags: false
          clean: true
